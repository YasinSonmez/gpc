# PushT Manipulation Configuration

# Environment
task_name: pusht
episode_length: 400

# Controller
controller_type: predictive_sampling
num_samples: 128
noise_level: 0.4
num_policy_samples: 16
# strategy: "best"


# Architecture
architecture: mlp
hidden_layers: [256, 256, 256]  # feature_dims for CNN

# Training
num_iters: 10
num_envs: 128
learning_rate: 0.001
batch_size: 4096
num_epochs: 50
exploration_noise_level: 0.0
normalize_observations: true

# Checkpointing & Evaluation
checkpoint_every: 10
num_eval_episodes: 0
video_fps: 30
video_quality: 3
video_resolution: [1280, 720]

# Value Function Integration
use_value_function: false
value_learning_rate: 0.001
iql_tau: 0.1
discount_factor: 0.99
value_hidden_layers: [256, 256, 256]
polyak_tau: 0.005
value_alpha_start: 0.0
value_alpha_end: 0.01
value_train_epochs: 20

# Logging & Visualization
record_training_videos: false
num_training_videos: 1
record_eval_videos: false
log_verbosity: 2

experiment_name: pusht_ablations
use_wandb: true
wandb_project: gpc_pusht_ablations2
