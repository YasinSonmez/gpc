# Diagnostic PushT K=12 chunked CEM ablation.
#
# This tests whether Hydrax's diagonal-covariance CEM improves smoothness/cost
# when used inside the existing ChunkedPAC wrapper.
#
# Run:
#   uv run python scripts/run_ablation.py \
#     configs/examples/pusht_k12_chunked_cem_ablation.yaml \
#     --parallel 2 --yes

base_config: configs/pusht_k12_chunked.yaml

num_seeds: 3
num_iters: 1

use_wandb: true
wandb_project: gpc_pusht_chunked_cem_ablation
experiment_name: pusht_k12_chunked_cem_ablation

controller_type: cem
chunked_spc: true
record_training_videos: false
record_eval_videos: true
num_eval_episodes: 8
proposal_overlay: true

grid:
  num_elites: [16, 32, 64]
  sigma_start: [0.2, 0.5, 1.0]
  sigma_min: [0.02, 0.05]
  chunk_size: [4, 6]
  chunk_temperature: [0.01, 0.1]
  spline_type: [zero, linear]

variants: {}
