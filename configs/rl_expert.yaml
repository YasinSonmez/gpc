# Configuration for training an RL expert (Brax/SAC)
task_name: walker_gym
seed: 1

# Training Parameters (SAC)
total_timesteps: 5000000
num_envs: 128
reward_scaling: 1
episode_length: 1000
normalize_observations: true
action_repeat: 1
discounting: 0.99
learning_rate: 3e-4
num_evals: 20
batch_size: 4096
num_knots: 4
plan_horizon: 0.5
grad_updates_per_step: 5
max_devices_per_host: null
max_replay_size: 1048576
min_replay_size: 8192

# Output Settings
output_dir: "experiments/rl_expert"
wandb_project: "gpc_rl_expert"
use_wandb: true
record_video: true
render_camera: "floating"

# Replay Buffer Recording
record_buffer: true
buffer_size: 1000000        # Number of transitions to record
buffer_num_envs: 128        # Number of parallel envs for recording
buffer_output_file: "expert_buffer.pkl" # Will be saved in output_dir
