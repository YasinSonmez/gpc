# Avoid Navigation Configuration: U-Trap Variant

# Environment
task_name: avoid
task_variant: u_trap
episode_length: 200

# Controller
controller_type: cem
num_elites: 16
sigma_start: 2.0
sigma_min: 0.025
num_samples: 256
iterations: 4
noise_level: 0.2
num_policy_samples: 1
num_knots: 12
plan_horizon: 1.5
strategy: "best"

# Architecture
architecture: mlp
hidden_layers: [32, 32]

# Training
num_iters: 1
num_envs: 16
learning_rate: 0.001
batch_size: 4096
num_epochs: 50
exploration_noise_level: 0.0
normalize_observations: true

# Checkpointing & Evaluation
checkpoint_every: 10
num_eval_episodes: 0
video_fps: 30
video_quality: 10
video_resolution: [1920, 1080]

# Logging & Visualization
record_training_videos: true
num_training_videos: 1
record_eval_videos: false
log_verbosity: 2

proposal_overlay: true
proposal_video_ghost_count: 0
proposal_video_num_display: 32
proposal_video_trace_points: 50

experiment_name: avoid_u_trap
wandb_project: spc_avoid
use_wandb: true